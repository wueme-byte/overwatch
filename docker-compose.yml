services:
  redis:
    image: redis:7-alpine
    restart: always

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    restart: always

  bot:
    build: .
    command: python bot/main.py
    env_file: .env
    depends_on:
      - redis
    restart: always
